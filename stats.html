<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>GT3 RACER — Статистика</title>
<link rel="stylesheet" href="menu.css">
<style>
  #bestLapsTab{margin-top:16px;border:1px solid var(--panel-edge);border-radius:14px;
    background:linear-gradient(180deg,var(--panel),#0c0c0e);overflow:hidden;}
  #bestLapsHead{display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;cursor:pointer;pointer-events:auto;}
  #bestLapsHead .t{font-family:"SF Mono","Consolas",monospace;font-weight:800;
    font-size:13px;letter-spacing:1px;color:var(--grello);}
  #bestLapsHead .chev{color:var(--text-dim);transition:transform .25s ease;font-size:13px;}
  #bestLapsHead.open .chev{transform:rotate(180deg);}
  #bestLapsBody{max-height:0;overflow:hidden;transition:max-height .35s ease;}
  #bestLapsBody.open{max-height:1000px;}
  #bestLapsBody .inner{padding:0 16px 16px;}
  .trackGroup{margin-top:14px;}
  .trackGroup:first-child{margin-top:0;}
  .trackGroupName{font-size:11px;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;}
  .lapRow{display:flex;justify-content:space-between;align-items:center;
    padding:8px 10px;background:#1c1c20;border:1px solid var(--panel-edge);
    border-radius:8px;margin-bottom:6px;font-size:12px;}
  .lapRow .carName{color:var(--text);}
  .lapRow .lapTime{font-family:"SF Mono","Consolas",monospace;font-weight:700;color:var(--grello);}
  #bestLapsEmpty{font-size:12px;color:var(--text-dim);}
</style>
</head>
<body>
<div id="pageRoot">
  <a href="index.html" class="backLink">‹ меню</a>
  <h1>YOUR STATISTICS</h1>
  <div class="statGrid">
    <div class="statCard">
      <div class="statVal" id="statLaps">0</div>
      <div class="statLbl">кругов проехано</div>
    </div>
    <div class="statCard">
      <div class="statVal" id="statClean">0%</div>
      <div class="statLbl">чистых кругов (без нарушений лимитов)</div>
    </div>
    <div class="statCard">
      <div class="statVal" id="statKm">0.0</div>
      <div class="statLbl">км проехано</div>
    </div>
  </div>

  <div id="bestLapsTab">
    <div id="bestLapsHead">
      <span class="t">ЛУЧШИЕ КРУГИ</span>
      <span class="chev">▾</span>
    </div>
    <div id="bestLapsBody"><div class="inner" id="bestLapsInner"></div></div>
  </div>
</div>
<script src="track.js"></script>
<script src="cars.js"></script>
<script src="stats.js"></script>
</body>
</html>
