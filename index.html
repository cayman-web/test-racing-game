<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GT3 Racer">
<meta name="theme-color" content="#0a0a0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<title>GT3 RACER</title>
<link rel="stylesheet" href="menu.css">
</head>
<body>

<div id="menuRoot">
  <a class="tile tile-drive" href="race.html" id="driveTile">
    <img id="trackBgImg" alt="">
    <canvas id="driveThumb"></canvas>
    <img id="driveCarImg" alt="">
    <div class="tileLabel">
      <div class="tileTitle">DRIVE</div>
      <div class="tileSub" id="lastRunInfo">Заездов ещё не было</div>
    </div>
  </a>

  <div class="tile-col">
    <a class="tile tile-stats" href="stats.html">
      <div class="tileTitle">YOUR STATISTICS</div>
      <div class="tileSub">круги · чистота · километраж</div>
    </a>
    <a class="tile tile-settings" href="settings.html">
      <div class="tileTitle">SETTINGS</div>
      <div class="tileSub" id="controlPrefLabel">Управление: экран</div>
    </a>
  </div>
</div>

<script src="track.js"></script>
<script src="menu.js"></script>
</body>
</html>
